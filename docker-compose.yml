# docker-compose.yml - llama-swap with profiles for CPU, NVIDIA, Vulkan, Intel, and native build
#
# Usage:
#   docker compose --profile native up -d   # Build from source (any arch: arm64, amd64)
#   docker compose --profile cpu up -d      # CPU only (pre-built, amd64)
#   docker compose --profile nvidia up -d   # NVIDIA GPU (CUDA, pre-built, amd64)
#   docker compose --profile vulkan up -d   # AMD GPU (Vulkan, pre-built, amd64)
#   docker compose --profile intel up -d    # Intel GPU (pre-built, amd64)
#
# Stop:
#   docker compose down

# Base configuration (shared by all profiles)
x-base: &base
  user: "10001:10001"
  ports:
    - "11435:8080"
  environment:
    - LLAMA_SERVER=/app/llama-server
    - LLAMA_MODELS_DIR=/models
  volumes:
    - ${HOME}/.llama/models:/models
    - ./config:/config
    - ./logs:/logs
  command: --config /config/config.yaml --listen :8080
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

services:
  llama-swap-cpu:
    <<: *base
    image: ghcr.io/mostlygeek/llama-swap:cpu
    container_name: llama-swap-cpu
    profiles: [cpu]

  llama-swap-nvidia:
    <<: *base
    image: ghcr.io/mostlygeek/llama-swap:cuda
    container_name: llama-swap-nvidia
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles: [nvidia]

  llama-swap-vulkan:
    <<: *base
    image: ghcr.io/mostlygeek/llama-swap:vulkan
    container_name: llama-swap-vulkan
    profiles: [vulkan]

  llama-swap-intel:
    <<: *base
    image: ghcr.io/mostlygeek/llama-swap:intel
    container_name: llama-swap-intel
    profiles: [intel]

  # Build-only service: produces the llama-server-native:latest image
  # used as the base for llama-swap-native. Not started at runtime.
  llama-server-native:
    image: llama-server-native:latest
    build:
      context: .
      dockerfile: Dockerfile.llama
      args:
        LLAMA_CPP_VERSION: b8331
    profiles: [build]

  llama-swap-native:
    <<: *base
    build:
      context: .
      dockerfile: Dockerfile.llama-swap
      args:
        LLAMA_SWAP_VERSION: v198
        BASE_IMAGE: llama-server-native:latest
    container_name: llama-swap-native
    profiles: [native]